{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockApp — Ingresar</title>
    {% tailwind_css %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #1a237e 0%, #1565c0 50%, #1976d2 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            width: 100%;
            padding: 12px 16px 12px 42px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .input-field::placeholder { color: rgba(255,255,255,0.5); }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.6;
        }
        .btn-login {
            width: 100%;
            background: #2979ff;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 0.05em;
        }
        .btn-login:hover { background: #1565c0; }
        .shape {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- Formas decorativas de fondo -->
    <div class="shape" style="width:400px;height:400px;top:-100px;left:-100px;"></div>
    <div class="shape" style="width:300px;height:300px;bottom:-80px;right:-80px;"></div>
    <div class="shape" style="width:200px;height:200px;top:40%;right:10%;"></div>

    <div class="card w-full max-w-sm mx-4 p-8 relative z-10">

        <!-- Logo y título -->
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">👕</div>
            <h1 class="text-2xl font-semibold text-white">StockApp</h1>
            <p class="text-white opacity-50 text-sm mt-1">Control de inventario</p>
        </div>

        <!-- Error -->
        {% if form.errors %}
        <div class="bg-red-500 bg-opacity-20 border border-red-400 border-opacity-30 text-white text-sm rounded-xl px-4 py-3 mb-5 text-center">
            ❌ Usuario o contraseña incorrectos
        </div>
        {% endif %}

        <!-- Formulario -->
        <form method="POST">
            {% csrf_token %}

            <div class="relative mb-4">
                <span class="input-icon">👤</span>
                <input
                    type="text"
                    name="username"
                    placeholder="Usuario"
                    class="input-field"
                    autofocus
                />
            </div>

            <div class="relative mb-6">
                <span class="input-icon">🔒</span>
                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    class="input-field"
                />
            </div>

            <button type="submit" class="btn-login">
                INGRESAR
            </button>

        </form>

        <!-- Footer -->
        <p class="text-center text-white opacity-30 text-xs mt-6">
            StockApp v1.0 — Control de stock para tu negocio
        </p>

    </div>

</body>
</html>
